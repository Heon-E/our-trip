<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Our Trip</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --bg:#fdf6f8; --surface:#ffffff; --surface2:#f9eef2; --text:#2c2329; --muted:#9a8b91;
  --border:#f0dfe6; --accent:#d4537e; --accent-soft:#fbeaf0; --gold:#e0a93b; --good:#5b8c5a; --info:#3d8bcd;
  --shadow:0 1px 3px rgba(60,30,40,.06),0 4px 16px rgba(60,30,40,.05);
}
[data-theme="dark"]{
  --bg:#171115; --surface:#211a1e; --surface2:#2b2125; --text:#ece4e8; --muted:#a8959d;
  --border:#3a2c32; --accent:#e87aa0; --accent-soft:#3a2028; --gold:#e6b94f; --good:#7bb06f; --info:#5fa0d8;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;
  max-width:480px;margin:0 auto;padding:max(env(safe-area-inset-top),12px) 12px 80px}
h1,h2{font-family:Georgia,serif;font-weight:600}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
header h1{font-size:1.25rem}
.muted{color:var(--muted)} .small{font-size:.82rem}
.banner{background:var(--accent-soft);color:var(--accent);font-size:.74rem;padding:8px 11px;border-radius:10px;margin-bottom:12px}
.userbar{display:flex;align-items:center;gap:8px}
.who{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:4px 5px 4px 10px;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--text)}
.ava{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:.78rem;color:#fff;font-weight:700}
.ava.j{background:#3d8bcd} .ava.y{background:#d4537e}
.iconbtn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px 9px;cursor:pointer;color:var(--text);font-size:1rem}

.tabbar{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;display:flex;z-index:30;
  background:var(--surface);border-top:1px solid var(--border);padding:6px 0 max(env(safe-area-inset-bottom),6px)}
.tabbar button{flex:1;border:none;background:none;color:var(--muted);font-size:.62rem;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;font-weight:600}
.tabbar button .ic{font-size:1.2rem;line-height:1}
.tabbar button.active{color:var(--accent)}

.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);margin-bottom:11px}
.sec{font-size:.74rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:16px 2px 8px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:11px}
.chip{font-size:.82rem;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted);
  padding:6px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.seg{display:flex;gap:6px;background:var(--surface2);padding:4px;border-radius:11px;margin-bottom:12px}
.seg button{flex:1;border:none;background:transparent;color:var(--muted);font-size:.85rem;font-weight:600;padding:7px;border-radius:8px;cursor:pointer}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
input,select,textarea{font:inherit;padding:9px 11px;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);width:100%}
textarea{resize:vertical;min-height:38px}

.metrics{display:flex;gap:9px;margin-bottom:11px}
.metric{flex:1;background:var(--surface2);border-radius:12px;padding:11px;text-align:center}
.metric .v{font-size:1.4rem;font-weight:700;font-family:Georgia,serif}
.metric .l{font-size:.68rem;color:var(--muted);margin-top:1px}
.match{background:linear-gradient(100deg,var(--accent),#e88aa8);color:#fff;border-radius:14px;padding:15px;margin-bottom:11px}
.match .pct{font-size:2rem;font-weight:700;font-family:Georgia,serif}

.p-name{font-size:1.02rem;font-weight:700;flex:1}
.badge{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:999px;color:#fff;white-space:nowrap}
.p-meta{font-size:.8rem;color:var(--muted);margin-top:2px}
.rate-row{display:flex;align-items:center;gap:8px;margin-top:7px}
.rate-row .ava{width:22px;height:22px;font-size:.7rem}
.stars{font-size:1.12rem;letter-spacing:1px;color:var(--border);user-select:none}
.stars .on{color:var(--gold)}
.stars.edit span{cursor:pointer}
.avg{margin-left:auto;font-size:.8rem;color:var(--muted)} .avg b{color:var(--text)}
.memo{margin-top:6px;font-size:.82rem}
.memo .partner{background:var(--surface2);border-radius:8px;padding:6px 9px;color:var(--muted);margin-bottom:4px}
.memo input{font-size:.82rem;padding:6px 9px}
.p-actions{display:flex;align-items:center;gap:8px;margin-top:10px;border-top:1px solid var(--border);padding-top:9px}
.act{font-size:.8rem;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted);
  padding:5px 11px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.act.wish.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
.act.go.on{background:var(--good);color:#fff;border-color:var(--good)}
.bothwish{font-size:.7rem;color:var(--accent);font-weight:700}

#map{height:240px;border-radius:14px;border:1px solid var(--border);margin-bottom:12px;z-index:0}
#homemap{height:210px;border-radius:14px;border:1px solid var(--border);margin-bottom:11px;z-index:0}

.leg{display:flex;gap:10px}
.leg .line{display:flex;flex-direction:column;align-items:center}
.leg .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);margin-top:5px}
.leg .bar{flex:1;width:2px;background:var(--border)}
.leg .body{flex:1;padding-bottom:14px}
.leg .city{font-weight:700}
.leg .when{font-size:.78rem;color:var(--muted)}
.leg .note{font-size:.82rem;margin-top:2px}
.stay{font-size:.76rem;color:var(--info);text-decoration:none;display:inline-flex;align-items:center;gap:3px;margin-top:3px}

.exp-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.exp-row:last-child{border:none}
.amt{margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.amt .krw{display:block;font-size:.72rem;color:var(--muted);font-weight:400}
.citytot{display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;color:var(--muted)}
.split{background:var(--accent-soft);color:var(--accent);border-radius:10px;padding:10px 12px;font-size:.86rem;font-weight:600;margin-top:8px}
.bktbar{height:12px;border-radius:999px;background:var(--surface2);overflow:hidden;margin:6px 0 12px}
.bktbar span{display:block;height:100%;background:var(--accent);transition:width .3s}
.check-item{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.check-item:last-child{border:none}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);display:grid;place-items:center;color:#fff;flex:none;font-size:.8rem;cursor:pointer}
.check-item.done .chk{background:var(--good);border-color:var(--good)}
.check-item.done .lbl{text-decoration:line-through;color:var(--muted)}
.check-item .lbl{flex:1}
.check-item .sub{font-size:.74rem;color:var(--muted)}
.linkmini{font-size:.74rem;color:var(--info);text-decoration:none}

.dday{font-size:.72rem;font-weight:700;color:var(--accent)}
.empty{color:var(--muted);font-size:.88rem;padding:6px 2px}
.addrow{display:flex;gap:6px;margin-top:10px}
.btn{background:var(--accent);color:#fff;border:none;padding:11px 16px;border-radius:11px;cursor:pointer;font-weight:600;font:inherit;width:100%}
.btn.sm{padding:9px 12px;width:auto;white-space:nowrap}
.btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.tripsel{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.tripsel .chip{flex:none}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50}
.modal.show{display:flex}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:480px}
.sheet h2{font-size:1.05rem;margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:.76rem;color:var(--muted);margin-bottom:3px;font-weight:600}
.row2{display:flex;gap:8px}.row2>*{flex:1}
</style>
</head>
<body>
<header>
  <h1>💕 Our Trip</h1>
  <div class="userbar">
    <button class="who" id="whoBtn"><span class="ava" id="ava">J</span><span id="whoName">Jaheon</span> <span class="muted small">⇄</span></button>
    <button class="iconbtn" id="themeBtn">🌙</button>
  </div>
</header>
<div class="banner">🧪 Prototype v2 — saved on this device only (real-time sharing via Firebase after discharge). Tap <b>Jaheon ⇄ partner</b> to try dual ratings.</div>

<div id="foodmapwrap" style="display:none"><div id="map"></div></div>
<section id="view"></section>

<div class="tabbar" id="tabbar">
  <button data-tab="home" class="active"><span class="ic">🏠</span>Home</button>
  <button data-tab="trip"><span class="ic">✈️</span>Trips</button>
  <button data-tab="food"><span class="ic">🍜</span>Food</button>
  <button data-tab="plan"><span class="ic">📋</span>Plan</button>
  <button data-tab="set"><span class="ic">⚙️</span>Settings</button>
</div>

<div class="modal" id="resModal"><div class="sheet">
  <h2>Add reservation</h2>
  <div class="field"><label>Place</label><input type="text" id="rPlace" readonly></div>
  <div class="row2"><div class="field"><label>Date</label><input type="date" id="rDate"></div>
    <div class="field"><label>Time</label><input type="time" id="rTime" value="19:00"></div></div>
  <div class="row2"><button class="btn ghost" id="rCancel">Cancel</button><button class="btn" id="rSave">Save</button></div>
</div></div>

<div class="modal" id="expModal"><div class="sheet">
  <h2>Add expense</h2>
  <div class="field"><label>Item</label><input type="text" id="eLabel" placeholder="e.g. Hanok dinner"></div>
  <div class="row2"><div class="field"><label id="eAmtL">Amount</label><input type="number" id="eAmt" placeholder="0"></div>
    <div class="field"><label>Category</label><select id="eCat"><option>Food</option><option>Stay</option><option>Transport</option><option>Activity</option><option>Other</option></select></div></div>
  <div class="field"><label>City</label><select id="eCity"></select></div>
  <div class="row2"><button class="btn ghost" id="eCancel">Cancel</button><button class="btn" id="eSave">Save</button></div>
</div></div>

<div class="modal" id="tripModal"><div class="sheet">
  <h2>New trip</h2>
  <div class="field"><label>Name</label><input type="text" id="tName" placeholder="e.g. 2028 Japan"></div>
  <div class="row2"><div class="field"><label>Start</label><input type="date" id="tStart"></div>
    <div class="field"><label>End</label><input type="date" id="tEnd"></div></div>
  <div class="field"><label>Currency</label><select id="tCur"><option value="KRW">KRW ₩</option><option value="EUR">EUR €</option><option value="THB">THB ฿</option><option value="JPY">JPY ¥</option><option value="USD">USD $</option></select></div>
  <div class="row2"><button class="btn ghost" id="tCancel">Cancel</button><button class="btn" id="tSave">Create</button></div>
</div></div>

<div class="modal" id="prepModal"><div class="sheet">
  <h2>Add to-do</h2>
  <div class="field"><label>Type</label><select id="pType"><option value="flight">✈️ Flight</option><option value="resv">🍽️ Reservation</option><option value="todo">✅ To-do</option></select></div>
  <div class="field"><label>Label</label><input type="text" id="pLabel" placeholder="e.g. Book ICN→CDG flights"></div>
  <div class="row2"><button class="btn ghost" id="pCancel">Cancel</button><button class="btn" id="pSave">Add</button></div>
</div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

function sv(k,v){try{LS.setItem(k,JSON.stringify(v))}catch(e){}}

function fmt(amount,cur){const s=SYM[cur]||'';const a=Math.round(amount).toLocaleString('en-US');
  if(cur==='KRW')return '₩'+a;
  const krw=Math.round(amount*(rates[cur]||1)).toLocaleString('en-US');
  return `${s}${a} <span class="krw">₩${krw}</span>`;}

let pdata=gv('ut_pdata',{});
function pd(id){return pdata[id]||(pdata[id]={rating:{},wish:{},visited:{},memo:{}})}
function savePd(){sv('ut_pdata',pdata)}

let wishCtry=gv('ut_wishctry',[{id:'w1',name:'🇯🇵 Japan',by:'j'},{id:'w2',name:'🇮🇹 Italy',by:'y'},{id:'w3',name:'🇨🇭 Switzerland',by:'j'}]);
function saveWishCtry(){sv('ut_wishctry',wishCtry)}
function avg(id){const r=pd(id).rating;const v=[r.j,r.y].filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0}
function bothWish(id){const w=pd(id).wish;return w.j&&w.y}

let trips=gv('ut_trips',null);if(!trips){trips=defaultTrips();sv('ut_trips',trips)}
let activeId=gv('ut_active',trips[0].id);
function T(){return trips.find(t=>t.id===activeId)||trips[0]}
function saveTrips(){sv('ut_trips',trips)}
function tripCities(t){return [...new Set(t.legs.map(l=>l.c))]}

/* ===== dates ===== */
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function today(){return ymd(new Date())}
function dday(s){if(!s)return null;return Math.round((new Date(s)-new Date(today()))/86400000)}
function ddayLabel(s){const n=dday(s);return n==null?'':n>0?'D-'+n:n===0?'D-DAY':'past'}

/* ===== state ===== */
let tab='home',tripSub='plan',foodCity='all',foodWishOnly=false,foodQ='';

/* ===== widgets ===== */
function starHTML(id,u,ed){const v=pd(id).rating[u]||0;let s='';
  for(let i=1;i<=5;i++)s+=`<span class="${i<=v?'on':''}" ${ed?`data-star="${id}:${u}:${i}"`:''}>★</span>`;
  return `<span class="stars ${ed?'edit':''}">${s}</span>`}
function placeCard(p){const u=pd(p.id);const a=avg(p.id);const c=CITYMETA[p.city];const partner=me==='j'?'y':'j';
  const pm=u.memo[partner];
  const naver='https://map.naver.com/p/search/'+encodeURIComponent(p.name+' '+p.area);
  const kakao='https://map.kakao.com/link/map/'+encodeURIComponent(p.name)+','+p.lat+','+p.lng;
  return `<div class="card">
    <div style="display:flex;gap:8px"><div style="flex:1">
      <span class="p-name">${p.name}</span>
      <div class="p-meta">🏷 ${p.genre} · 📍 ${p.area} ${bothWish(p.id)?'<span class="bothwish">· both want to go ❤</span>':''}</div>
      <div class="small" style="margin-top:3px"><a class="linkmini" href="${naver}" target="_blank" rel="noopener">📍 Naver Map</a> · <a class="linkmini" href="${kakao}" target="_blank" rel="noopener">Kakao Map</a></div></div>
      <span class="badge" style="background:${c.c}">${c.n}</span></div>
    <div class="rate-row"><span class="ava j">${uini('j')}</span>${starHTML(p.id,'j',me==='j')}</div>
    <div class="rate-row"><span class="ava y">${uini('y')}</span>${starHTML(p.id,'y',me==='y')}<span class="avg">avg <b>${a?a.toFixed(1):'–'}</b></span></div>
    <div class="memo">${pm?`<div class="partner">💬 ${uname(partner)}: ${pm}</div>`:''}
      <input type="text" data-memo="${p.id}" value="${(u.memo[me]||'').replace(/"/g,'&quot;')}" placeholder="Add your note…"></div>
    <div class="p-actions">
      <button class="act wish ${u.wish[me]?'on':''}" data-wish="${p.id}">❤ Want to go</button>
      <button class="act go ${u.visited[me]?'on':''}" data-go="${p.id}">✓ Been</button>
      <button class="act" data-res="${p.id}" style="margin-left:auto">📅 Reserve</button></div></div>`}

/* ===== Home ===== */
function viewHome(){
  const future=trips.filter(t=>t.start&&dday(t.start)>=0).sort((a,b)=>a.start.localeCompare(b.start));
  const t=future[0]||T();
  // taste match
  const both=SEED.filter(p=>pd(p.id).rating.j>0&&pd(p.id).rating.y>0);
  let match=null;if(both.length){const m=both.reduce((s,p)=>s+(1-Math.abs(pd(p.id).rating.j-pd(p.id).rating.y)/4),0)/both.length;match=Math.round(m*100)}
  const ratedCnt=SEED.filter(p=>avg(p.id)>0).length;
  const beenBoth=SEED.filter(p=>pd(p.id).visited.j&&pd(p.id).visited.y).length;
  const wishCnt=SEED.filter(p=>bothWish(p.id)).length;
  const upcoming=[];trips.forEach(tr=>tr.prep.forEach(p=>{if(p.date&&dday(p.date)>=0)upcoming.push({...p,trip:tr.name})}));
  upcoming.sort((a,b)=>a.date.localeCompare(b.date));
  const rated=SEED.filter(p=>avg(p.id)>0).sort((a,b)=>avg(b.id)-avg(a.id)).slice(0,3);
  let h=`<div class="card" style="background:var(--accent-soft);border-color:var(--accent)">
    <div class="small" style="color:var(--accent);font-weight:700">NEXT TRIP</div>
    <div style="font-size:1.3rem;font-weight:700;font-family:Georgia,serif;margin-top:2px">${t.name} <span style="font-size:.9rem">${ddayLabel(t.start)}</span></div>
    <div class="small muted">${t.start} ~ ${t.end} · ${tripCities(t).length} cities</div></div>`;
  if(match!=null)h+=`<div class="match"><div style="font-size:.8rem;opacity:.9">💕 Taste match</div><div class="pct">${match}%</div>
    <div class="small" style="opacity:.9">across ${both.length} place${both.length>1?'s':''} you both rated</div></div>`;
  h+=`<div class="metrics">
    <div class="metric"><div class="v">${ratedCnt}</div><div class="l">Rated</div></div>
    <div class="metric"><div class="v">${beenBoth}</div><div class="l">Been together</div></div>
    <div class="metric"><div class="v">${wishCnt}</div><div class="l">Both wishlist</div></div></div>`;
  // map of places we've been
  const been=SEED.filter(p=>pd(p.id).visited.j||pd(p.id).visited.y);
  h+=`<div class="sec">🗺 Where we've been</div>`;
  h+=been.length?`<div id="homemap"></div>`:`<div class="card empty">Mark places "Been" in Food and they'll pin here.</div>`;
  // countries we want to visit
  h+=`<div class="sec">🌍 Countries we want to visit</div><div class="card">`;
  h+=wishCtry.length?wishCtry.map(w=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0">
    <span class="ava ${w.by}" style="width:20px;height:20px;font-size:.62rem">${uini(w.by)}</span>
    <span style="flex:1">${w.name}</span><button class="act" data-delctry="${w.id}" style="padding:3px 7px">🗑</button></div>`).join('')
    :`<div class="empty">Add a dream destination 👇</div>`;
  h+=`<div class="addrow"><input type="text" id="ctryNew" placeholder="Add a country / place"><button class="btn sm" id="addCtry">Add</button></div></div>`;
  h+=`<div class="sec">📅 Upcoming bookings</div>`;
  h+=upcoming.length?'<div class="card">'+upcoming.slice(0,4).map(p=>`<div style="display:flex;gap:10px;padding:5px 0;align-items:center">
    <span class="dday" style="min-width:46px">${ddayLabel(p.date)}</span><div style="flex:1"><div style="font-weight:600">${p.label}</div><div class="small muted">${p.date} · ${p.trip}</div></div></div>`).join('')+'</div>'
    :`<div class="card empty">No dated bookings yet. Add them in the Plan tab.</div>`;
  h+=`<div class="sec">❤ Both want to go</div>`;
  h+=wishCnt?'<div class="card">'+SEED.filter(p=>bothWish(p.id)).map(p=>`<div style="display:flex;gap:8px;padding:5px 0;align-items:center">
    <span class="badge" style="background:${CITYMETA[p.city].c}">${CITYMETA[p.city].n}</span><span style="flex:1">${p.name}</span><span class="small muted">${p.genre}</span></div>`).join('')+'</div>'
    :`<div class="card empty">Places you both ❤ show up here.</div>`;
  h+=`<div class="sec">⭐ Our top rated</div>`;
  h+=rated.length?'<div class="card">'+rated.map(p=>`<div style="display:flex;gap:8px;padding:5px 0"><span style="flex:1">${p.name}</span><span style="color:var(--gold)">★ ${avg(p.id).toFixed(1)}</span></div>`).join('')+'</div>'

}

/* ===== Trips ===== */
function viewTrip(){
  const t=T();
  let h=`<div class="tripsel">`+trips.map(tr=>`<span class="chip ${tr.id===activeId?'on':''}" data-trip="${tr.id}">${tr.name}</span>`).join('')
    +`<span class="chip" data-newtrip="1">＋ New</span></div>`;
  h+=`<div class="seg">
    <button class="${tripSub==='plan'?'on':''}" data-sub="plan">Itinerary</button>
    <button class="${tripSub==='budget'?'on':''}" data-sub="budget">Budget</button>
    <button class="${tripSub==='bucket'?'on':''}" data-sub="bucket">Bucket list</button></div>`;
  if(tripSub==='plan'){
    h+=`<div class="card"><div style="font-weight:700">${t.name}</div><div class="small muted" style="margin-bottom:12px">${t.start} ~ ${t.end} · ${ddayLabel(t.start)}</div>`;
    h+=t.legs.map((l,i)=>`<div class="leg"><div class="line"><div class="dot"></div>${i<t.legs.length-1?'<div class="bar"></div>':''}</div>
      <div class="body"><div class="city">${l.label}</div><div class="when">${l.date} · ${l.nights}</div><div class="note">${l.note}</div>
      ${l.stay?`<a class="stay" href="${l.stay}" target="_blank" rel="noopener">🏠 View stay ↗</a>`:''}</div></div>`).join('');
    h+=`</div>`;
  } else if(tripSub==='budget'){
    const total=t.expenses.reduce((s,e)=>s+e.amount,0);
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:baseline">
      <span class="muted small">Total spent</span><span style="font-size:1.25rem;font-weight:700">${fmt(total,t.cur)}</span></div>
      <div class="split">💸 Split evenly · each pays ${fmt(total/2,t.cur)}</div></div>`;
    // by city
    const cities=tripCities(t);
    h+=`<div class="card"><div class="sec" style="margin:0 0 6px">By city</div>`;
    let any=false;
    cities.forEach(c=>{const ce=t.expenses.filter(e=>e.city===c);if(!ce.length)return;any=true;const ct=ce.reduce((s,e)=>s+e.amount,0);
      h+=`<div class="citytot"><span style="font-weight:600;color:var(--text)">${c}</span><span style="color:var(--text);font-weight:600">${fmt(ct,t.cur)}</span></div>`;
      h+=ce.map(e=>`<div class="exp-row"><div><div>${e.label}</div><div class="small muted">${e.cat}</div></div><span class="amt">${fmt(e.amount,t.cur)}</span><button class="act" data-delexp="${e.id}" style="padding:3px 7px">🗑</button></div>`).join('');});
    const noCity=t.expenses.filter(e=>!cities.includes(e.city));
    if(noCity.length){any=true;h+=`<div class="citytot"><span style="font-weight:600;color:var(--text)">Other</span><span></span></div>`+noCity.map(e=>`<div class="exp-row"><div><div>${e.label}</div><div class="small muted">${e.cat}</div></div><span class="amt">${fmt(e.amount,t.cur)}</span><button class="act" data-delexp="${e.id}" style="padding:3px 7px">🗑</button></div>`).join('');}
    if(!any)h+=`<div class="empty">No expenses yet.</div>`;
    h+=`</div><button class="btn" id="addExp">+ Add expense</button>`;
  } else {
    const done=t.bucket.filter(b=>b.done).length;const pct=t.bucket.length?Math.round(done/t.bucket.length*100):0;
    h+=`<div class="card"><div style="display:flex;justify-content:space-between"><span class="small muted">Bucket list</span><span class="small" style="font-weight:700;color:var(--accent)">${done}/${t.bucket.length}</span></div>
      <div class="bktbar"><span style="width:${pct}%"></span></div>`;
    h+=t.bucket.map(b=>`<div class="check-item ${b.done?'done':''}"><span class="chk" data-bkt="${b.id}">${b.done?'✓':''}</span><span class="lbl">${b.text}</span></div>`).join('')||`<div class="empty">Nothing yet.</div>`;
    h+=`<div class="addrow"><input type="text" id="bktNew" placeholder="Add a bucket item"><button class="btn sm" id="addBkt">Add</button></div></div>`;
  }
  return h;
}

/* ===== Plan (bookings & to-do) ===== */
function viewPlan(){
  const t=T();
  let h=`<div class="tripsel">`+trips.map(tr=>`<span class="chip ${tr.id===activeId?'on':''}" data-trip="${tr.id}">${tr.name}</span>`).join('')+`</div>`;
  const flights=t.prep.filter(p=>p.type==='flight');
  const resvs=t.prep.filter(p=>p.type==='resv');
  const todos=t.prep.filter(p=>p.type==='todo');
  // flights
  h+=`<div class="sec">✈️ Flights</div><div class="card">`;
  h+=flights.length?flights.map(prepRow).join(''):`<div class="empty">No flights to book.</div>`;
  h+=`</div>`;
  // stays per city (derived)
  h+=`<div class="sec">🏨 Stays — cities to book</div><div class="card">`;
  const cities=tripCities(t);
  h+=cities.map(c=>{const leg=t.legs.find(l=>l.c===c&&l.stay);const booked=!!leg||t.stayDone[c];
    return `<div class="check-item ${booked?'done':''}"><span class="chk" data-stay="${c}">${booked?'✓':''}</span>
      <span class="lbl">${c}</span>${leg?`<a class="linkmini" href="${leg.stay}" target="_blank" rel="noopener">view ↗</a>`:`<span class="sub">${booked?'booked':'to book'}</span>`}</div>`}).join('');
  h+=`</div>`;
  // reservations
  h+=`<div class="sec">🍽️ Restaurant reservations</div><div class="card">`;
  h+=resvs.length?resvs.map(prepRow).join(''):`<div class="empty">Add from a Food card's 📅 Reserve.</div>`;
  h+=`</div>`;
  // to-do
  h+=`<div class="sec">✅ To-do</div><div class="card">`;
  h+=todos.length?todos.map(prepRow).join(''):`<div class="empty">Nothing yet.</div>`;
  h+=`</div><button class="btn" id="addPrep">+ Add item</button>`;
  return h;
}
function prepRow(p){return `<div class="check-item ${p.done?'done':''}"><span class="chk" data-prep="${p.id}">${p.done?'✓':''}</span>

/* ===== routing ===== */
const TILE='https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
let foodMap,foodLayer,foodFit=false,homeMap,homeLayer;
function render(){
  document.getElementById('view').innerHTML=
    tab==='home'?viewHome():tab==='trip'?viewTrip():tab==='food'?viewFood():tab==='plan'?viewPlan():viewSet();
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('foodmapwrap').style.display=tab==='food'?'block':'none';
  if(tab==='food')setupFoodMap();
  if(tab==='home')setupHomeMap();
  bind();
}
function dot(c){return L.divIcon({className:'',html:`<div style="width:15px;height:15px;border-radius:50% 50% 50% 0;background:${c};border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);transform:rotate(-45deg)"></div>`,iconSize:[15,15],iconAnchor:[7,15]})}
function setupFoodMap(){
  if(!foodMap){foodMap=L.map('map',{scrollWheelZoom:false}).setView([36.2,127.6],7);
    L.tileLayer(TILE,{attribution:'© OSM © CARTO',maxZoom:19}).addTo(foodMap);foodLayer=L.layerGroup().addTo(foodMap);}
  foodFit=false;drawFood();
  const refit=()=>{if(!foodMap)return;foodMap.invalidateSize();if(foodMap.getSize().x>0&&!foodFit){drawFood();foodFit=true}};
  [60,250,600].forEach(t=>setTimeout(refit,t));
}
function drawFood(){if(!foodLayer)return;foodLayer.clearLayers();
  let list=SEED.filter(p=>(foodCity==='all'||p.city===foodCity)&&(!foodWishOnly||bothWish(p.id))&&(!foodQ||(p.name+p.genre+p.area).toLowerCase().includes(foodQ.toLowerCase())));
  const pts=[];list.forEach(p=>{L.marker([p.lat,p.lng],{icon:dot(CITYMETA[p.city].c)}).bindPopup(`<b>${p.name}</b><br>${p.genre} · avg ${avg(p.id)?avg(p.id).toFixed(1):'–'}`).addTo(foodLayer);pts.push([p.lat,p.lng])});
  if(pts.length&&foodMap.getSize().x>0)foodMap.fitBounds(pts,{padding:[35,35],maxZoom:14});}
function setupHomeMap(){
  const el=document.getElementById('homemap');if(!el)return;
  if(homeMap){homeMap.remove();homeMap=null;}
  homeMap=L.map('homemap',{scrollWheelZoom:false,zoomControl:false}).setView([36.5,127.8],6);
  L.tileLayer(TILE,{attribution:'© OSM © CARTO',maxZoom:19}).addTo(homeMap);homeLayer=L.layerGroup().addTo(homeMap);
  const been=SEED.filter(p=>pd(p.id).visited.j||pd(p.id).visited.y);const pts=[];
  been.forEach(p=>{L.marker([p.lat,p.lng],{icon:dot(CITYMETA[p.city].c)}).bindPopup(`<b>${p.name}</b>`).addTo(homeLayer);pts.push([p.lat,p.lng])});
  const fit=()=>{if(!homeMap)return;homeMap.invalidateSize();if(homeMap.getSize().x>0&&pts.length)homeMap.fitBounds(pts,{padding:[30,30],maxZoom:12})};
  [60,250,600].forEach(t=>setTimeout(fit,t));
}

function bind(){
  document.querySelectorAll('[data-star]').forEach(s=>s.onclick=()=>{const[id,u,v]=s.dataset.star.split(':');const r=pd(id).rating;r[u]=(r[u]===+v?0:+v);savePd();render()});
  document.querySelectorAll('[data-wish]').forEach(b=>b.onclick=()=>{const w=pd(b.dataset.wish).wish;w[me]=!w[me];savePd();render()});
  document.querySelectorAll('[data-go]').forEach(b=>b.onclick=()=>{const g=pd(b.dataset.go).visited;g[me]=!g[me];savePd();render()});
  document.querySelectorAll('[data-memo]').forEach(inp=>{inp.onchange=()=>{pd(inp.dataset.memo).memo[me]=inp.value.trim();savePd()};});
  document.querySelectorAll('[data-res]').forEach(b=>b.onclick=()=>openRes(b.dataset.res));
  const fq=document.getElementById('fq');if(fq)fq.oninput=e=>{foodQ=e.target.value;const pos=e.target.selectionStart;render();const n=document.getElementById('fq');if(n){n.focus();n.setSelectionRange(pos,pos)}};
  document.querySelectorAll('[data-city]').forEach(c=>c.onclick=()=>{foodCity=c.dataset.city;render()});
  document.querySelectorAll('[data-wishf]').forEach(c=>c.onclick=()=>{foodWishOnly=!foodWishOnly;render()});
  document.querySelectorAll('[data-trip]').forEach(c=>c.onclick=()=>{activeId=c.dataset.trip;sv('ut_active',activeId);render()});
  document.querySelectorAll('[data-newtrip]').forEach(c=>c.onclick=()=>document.getElementById('tripModal').classList.add('show'));
  document.querySelectorAll('[data-sub]').forEach(b=>b.onclick=()=>{tripSub=b.dataset.sub;render()});
  document.querySelectorAll('[data-bkt]').forEach(b=>b.onclick=()=>{const it=T().bucket.find(x=>x.id===b.dataset.bkt);it.done=!it.done;saveTrips();render()});
  const ab=document.getElementById('addBkt');if(ab)ab.onclick=()=>{const v=document.getElementById('bktNew').value.trim();if(!v)return;T().bucket.push({id:'b'+Date.now(),text:v,done:false});saveTrips();render()};
  const ae=document.getElementById('addExp');if(ae)ae.onclick=openExp;
  document.querySelectorAll('[data-delexp]').forEach(b=>b.onclick=()=>{const t=T();t.expenses=t.expenses.filter(e=>e.id!==b.dataset.delexp);saveTrips();render()});
  document.querySelectorAll('[data-prep]').forEach(b=>b.onclick=()=>{const p=T().prep.find(x=>x.id===b.dataset.prep);p.done=!p.done;saveTrips();render()});
  document.querySelectorAll('[data-delprep]').forEach(b=>b.onclick=()=>{const t=T();t.prep=t.prep.filter(p=>p.id!==b.dataset.delprep);saveTrips();render()});
  document.querySelectorAll('[data-stay]').forEach(b=>b.onclick=()=>{const t=T();const c=b.dataset.stay;if(t.legs.some(l=>l.c===c&&l.stay))return;t.stayDone[c]=!t.stayDone[c];saveTrips();render()});
  const ap=document.getElementById('addPrep');if(ap)ap.onclick=()=>document.getElementById('prepModal').classList.add('show');
  const sn=document.getElementById('saveNames');if(sn)sn.onclick=()=>{names={j:document.getElementById('nameJ').value||'Jaheon',y:document.getElementById('nameY').value||'Partner'};sv('ut_names',names);applyUser();render()};
  const sr=document.getElementById('saveRates');if(sr)sr.onclick=()=>{rates.EUR=+document.getElementById('rEUR').value||rates.EUR;rates.THB=+document.getElementById('rTHB').value||rates.THB;rates.JPY=+document.getElementById('rJPY').value||rates.JPY;rates.USD=+document.getElementById('rUSD').value||rates.USD;sv('ut_rates',rates);alert('Rates saved')};
  const ac=document.getElementById('addCtry');if(ac)ac.onclick=()=>{const v=document.getElementById('ctryNew').value.trim();if(!v)return;wishCtry.push({id:'w'+Date.now(),name:v,by:me});saveWishCtry();render()};
  document.querySelectorAll('[data-delctry]').forEach(b=>b.onclick=()=>{wishCtry=wishCtry.filter(w=>w.id!==b.dataset.delctry);saveWishCtry();render()});
  const eb=document.getElementById('expBtn');if(eb)eb.onclick=exportData;
  const ib=document.getElementById('impBtn');if(ib)ib.onclick=()=>document.getElementById('impFile').click();
  const inf=document.getElementById('impFile');if(inf)inf.onchange=importData;
}

/* modals */
let resTarget=null;
function openRes(pid){resTarget=pid;document.getElementById('rPlace').value=SEED.find(x=>x.id===pid).name;
  const d=new Date();d.setDate(d.getDate()+1);document.getElementById('rDate').value=ymd(d);document.getElementById('resModal').classList.add('show')}
document.getElementById('rCancel').onclick=()=>document.getElementById('resModal').classList.remove('show');
document.getElementById('rSave').onclick=()=>{const p=SEED.find(x=>x.id===resTarget);
  T().prep.push({id:'pr'+Date.now(),type:'resv',label:p.name,date:document.getElementById('rDate').value,time:document.getElementById('rTime').value,done:false});
  saveTrips();document.getElementById('resModal').classList.remove('show');tab='plan';render()};
function openExp(){const sel=document.getElementById('eCity');sel.innerHTML=tripCities(T()).map(c=>`<option>${c}</option>`).join('')+'<option>Other</option>';
  document.getElementById('eAmtL').textContent='Amount ('+T().cur+')';document.getElementById('expModal').classList.add('show')}
document.getElementById('eCancel').onclick=()=>document.getElementById('expModal').classList.remove('show');
document.getElementById('eSave').onclick=()=>{const amt=parseFloat(document.getElementById('eAmt').value)||0;const lbl=document.getElementById('eLabel').value.trim();if(!lbl||!amt){alert('Enter item & amount');return}
  T().expenses.push({id:'e'+Date.now(),label:lbl,amount:amt,cat:document.getElementById('eCat').value,city:document.getElementById('eCity').value});saveTrips();
  document.getElementById('eLabel').value='';document.getElementById('eAmt').value='';document.getElementById('expModal').classList.remove('show');render()};
document.getElementById('tCancel').onclick=()=>document.getElementById('tripModal').classList.remove('show');
document.getElementById('tSave').onclick=()=>{const nm=document.getElementById('tName').value.trim();if(!nm){alert('Enter name');return}
  const id='t'+Date.now();trips.push({id,name:nm,start:document.getElementById('tStart').value,end:document.getElementById('tEnd').value,cur:document.getElementById('tCur').value,legs:[],expenses:[],bucket:[],prep:[],stayDone:{}});
  activeId=id;sv('ut_active',id);saveTrips();document.getElementById('tripModal').classList.remove('show');tab='trip';tripSub='plan';render()};
document.getElementById('pCancel').onclick=()=>document.getElementById('prepModal').classList.remove('show');
document.getElementById('pSave').onclick=()=>{const lbl=document.getElementById('pLabel').value.trim();if(!lbl){alert('Enter label');return}
  T().prep.push({id:'pr'+Date.now(),type:document.getElementById('pType').value,label:lbl,done:false});saveTrips();
  document.getElementById('pLabel').value='';document.getElementById('prepModal').classList.remove('show');render()};
['resModal','expModal','tripModal','prepModal'].forEach(id=>{const m=document.getElementById(id);m.onclick=e=>{if(e.target===m)m.classList.remove('show')}});

/* backup */
function exportData(){const d={names,rates,pdata,trips,activeId,exported:today()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='our-trip-backup.json';a.click();URL.revokeObjectURL(a.href)}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);
  if(d.names){names=d.names;sv('ut_names',names)}if(d.rates){rates=d.rates;sv('ut_rates',rates)}if(d.pdata){pdata=d.pdata;savePd()}
  if(d.trips){trips=d.trips;saveTrips()}if(d.activeId){activeId=d.activeId;sv('ut_active',activeId)}
  applyUser();render();alert('Imported')}catch(_){alert('File error')}};r.readAsText(f)}

/* user / tabs / theme */
function applyUser(){document.getElementById('ava').textContent=uini(me);document.getElementById('ava').className='ava '+me;document.getElementById('whoName').textContent=uname(me)}
document.getElementById('whoBtn').onclick=()=>{me=me==='j'?'y':'j';sv('ut_user',me);applyUser();render()};
document.querySelectorAll('.tabbar button').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;if(tab!=='food')foodFit=false;render()});
let theme=gv('ut_theme','light');
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);document.getElementById('themeBtn').textContent=theme==='dark'?'☀️':'🌙';setTimeout(()=>{if(foodMap)foodMap.invalidateSize();if(homeMap)homeMap.invalidateSize()},60)}
document.getElementById('themeBtn').onclick=()=>{theme=theme==='dark'?'light':'dark';sv('ut_theme',theme);applyTheme()};

applyUser();applyTheme();render();
</script>
</body>
</html>
